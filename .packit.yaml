---
jobs:
  - job: tests
    trigger: pull_request
    branch: main
    targets:
      - centos-stream-9
      - centos-stream-10
      - fedora-rawhide
      - fedora-stable
    skip_build: true
    tf_extra_params:
      test:
        tmt:
          name: "/Plans/ci-tests"
      environments:
        - tmt:
            context:
              target_PR_branch: main
